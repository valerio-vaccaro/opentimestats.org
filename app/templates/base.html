<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#212529">
  <title>{% block title %}OpenTimeStats{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>

<!-- Top navbar (always visible) -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/"><i class="bi bi-clock-history me-1"></i><span class="d-none d-sm-inline">OpenTimeStats</span><span class="d-sm-none">OTS</span></a>
    <!-- Hamburger shown only on medium and below where bottom-nav is hidden -->
    <button class="navbar-toggler d-none d-md-block d-lg-none" type="button"
            data-bs-toggle="collapse" data-bs-target="#nav" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-3 d-none d-lg-flex">
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
            <i class="bi bi-house-door"></i> Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/charts' %}active{% endif %}" href="/charts">
            <i class="bi bi-bar-chart-line"></i> Charts
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/table' %}active{% endif %}" href="/table">
            <i class="bi bi-table"></i> Table
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="container py-3 py-md-4">
  {% block content %}{% endblock %}
</main>

<footer class="border-top py-3 d-none d-lg-block">
  <div class="container text-center text-muted small">
    OpenTimeStats &mdash; Bitcoin OpenTimestamps confirmation tracker
  </div>
</footer>

<!-- Bottom navigation bar (mobile / tablet only) -->
<nav class="bottom-nav fixed-bottom d-lg-none" aria-label="Mobile navigation">
  <div class="d-flex">
    <a href="/" class="flex-fill text-decoration-none {% if request.path == '/' %}active{% endif %}">
      <i class="bi bi-house-door fs-5"></i>
      <span class="d-block" style="font-size:.65rem">Home</span>
    </a>
    <a href="/charts" class="flex-fill text-decoration-none {% if request.path == '/charts' %}active{% endif %}">
      <i class="bi bi-bar-chart-line fs-5"></i>
      <span class="d-block" style="font-size:.65rem">Charts</span>
    </a>
    <a href="/table" class="flex-fill text-decoration-none {% if request.path == '/table' %}active{% endif %}">
      <i class="bi bi-table fs-5"></i>
      <span class="d-block" style="font-size:.65rem">Table</span>
    </a>
  </div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

<script>
function fmtDelta(s) {
  if (s === null || s === undefined) return '—';
  if (s < 60)   return s.toFixed(0) + ' s';
  if (s < 3600) return (s / 60).toFixed(1) + ' m';
  return (s / 3600).toFixed(2) + ' h';
}
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString();
}
function fmtDateShort(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString();
}
function statusBadge(status) {
  const cls = { complete: 'success', partial: 'warning text-dark', pending: 'secondary', confirmed: 'success' };
  return `<span class="badge bg-${cls[status] ?? 'secondary'}">${status}</span>`;
}
const isMobile = () => window.innerWidth < 576;
</script>

<script>
// Readable chart labels on high-DPI phone screens
if (typeof Chart !== 'undefined') {
  Chart.defaults.font.size = 11;
  Chart.defaults.font.family = 'system-ui, -apple-system, sans-serif';
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
